<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KITCHEN SYSTEM PRO</title>
    <style>
        :root {  
            --bg: #090a0f; 
            --text: #ffffff; 
            --card: #12141c; 
            --border: #1f2330;  
            --accent: #ff9500; 
            --radius: 16px; 
            --transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);  
            --success: #30d158; 
            --warning: #ff9f0a; 
            --danger: #ff453a;
            --glowing-green: #39ff14;
            --kds-scale: 1.0; 
        }  
        [data-theme="light"] { 
            --bg: #f0f2f5; 
            --text: #000000; 
            --card: #ffffff; 
            --border: #dcdfe6; 
            --glowing-green: #1a8f00;
        }  
        
        /* 🎨 touch-action: manipulation 彻底禁止双击缩放，提速点击响应 */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }  
        
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; transition: background 0.3s, color 0.3s; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }  
        
        /* 满幅自适应设计 */
        .app-container { width: 100%; max-width: 100%; padding: 25px; position: relative; }
        
        /* --- 极简工业感 Header（坚决同一行排布） --- */  
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 18px; border-bottom: 2px solid var(--border); margin-bottom: 25px; position: relative; }  
        .title-group { display: flex; align-items: center; gap: 10px; }
        .system-title { font-size: 26px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: var(--text); }
        
        /* 🎨 高精物理系统实时电子时钟 */
        .live-clock-kds {
            font-size: 20px;
            font-weight: 900;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-left: 12px;
            padding-left: 12px;
            border-left: 2px solid var(--border);
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        /* 迷你连接状态灯 */
        .status-indicator { display: flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        
        .header-controls { display: flex; align-items: center; gap: 10px; }
        
        /* --- 顶部控制按钮（圆形、统一） --- */
        .header-btn { 
            background: var(--card); 
            border: 1px solid var(--border); 
            color: var(--text); 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: var(--transition);
        }
        .header-btn:active { transform: scale(0.9); background: var(--border); }
        .header-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        
        /* --- 动态下拉卡片面板 (Dynamic Settings Drawer) --- */
        .settings-drawer {
            position: absolute;
            top: 70px;
            right: 0;
            width: 320px;
            max-width: calc(100vw - 40px); 
            background: rgba(18, 20, 28, 0.85);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 20px 45px rgba(0,0,0,0.4);
            padding: 20px;
            z-index: 50000;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            gap: 18px;
            transform: translateY(-20px) scale(0.95);
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s, visibility 0.25s;
        }
        [data-theme="light"] .settings-drawer {
            background: rgba(255, 255, 255, 0.85);
        }
        .settings-drawer.show {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }
        
        .drawer-section { display: flex; flex-direction: column; gap: 10px; }
        .drawer-header-row { display: flex; align-items: center; gap: 8px; opacity: 0.6; }
        .drawer-label { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .label-icon { width: 14px; height: 14px; stroke: var(--text); stroke-width: 2.2; fill: none; }
        
        /* 自研音效卡片网格样式 */
        .sound-card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .sound-option-card { 
            background: var(--bg); 
            border: 2.2px solid var(--border); 
            border-radius: 12px; 
            padding: 12px 10px; 
            cursor: pointer; 
            transition: var(--transition); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
        }
        .sound-option-card.active { border-color: var(--accent); background: var(--card); box-shadow: 0 5px 15px rgba(255,149,0,0.08); }
        .sound-option-card svg { width: 22px; height: 22px; stroke: var(--text); stroke-width: 2.2; fill: none; }
        .sound-option-card span { font-size: 11px; font-weight: 900; }
        
        /* 滑动选择器 */
        .switcher-mini { background: var(--border); padding: 4px; border-radius: 10px; display: flex; position: relative; height: 34px; align-items: center; width: 100%; }  
        .sw-btn { flex: 1; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; color: #888; cursor: pointer; height: 100%; position: relative; transition: 0.3s; }  
        .sw-btn.active { color: var(--bg) !important; } 
        [data-theme="light"] .sw-btn.active { color: #fff !important; }
        .sw-slider { position: absolute; top: 4px; bottom: 4px; background: var(--text); border-radius: 6px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1; pointer-events: none; }
        
        /* --- 选项卡切换 --- */
        .tab-bar { display: flex; gap: 10px; margin-bottom: 25px; background: var(--card); padding: 5px; border-radius: 14px; width: fit-content; border: 1px solid var(--border); }
        .tab-btn { background: transparent; border: none; padding: 12px 24px; border-radius: 10px; font-size: 13px; font-weight: 900; color: #888; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: var(--text); color: var(--bg); }
        [data-theme="light"] .tab-btn.active { color: #fff; }
        .badge-count { background: var(--accent); color: #fff; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 900; }
        .tab-btn.active .badge-count { background: var(--bg); color: var(--text); }
        [data-theme="light"] .tab-btn.active .badge-count { background: #fff; color: #000; }
        
        /* --- 模拟出单轨道（后厨质感核心） --- */
        .order-rail { 
            background: linear-gradient(180deg, #1c1f2a 0%, #11131a 100%); 
            height: 14px; 
            width: 100%; 
            border-radius: 7px; 
            margin-bottom: -10px; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3); 
            border: 1px solid #2e3446;
            position: relative;
            z-index: 2;
        }
        
        /* --- 订单网格系统：自适应响应卡片 --- */
        .order-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            min-height: 200px; 
            padding-top: 15px; 
        }
        
        /* 🖥️ 关键大屏幕适配：固定放三格单（三列布局） */
        @media (min-width: 900px) {
            .order-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr)) !important; 
                gap: 25px;
            }
        }
        
        /* --- 工业工单卡片 (Ticket Design) --- */
        .order-card { 
            background: var(--card); 
            border-radius: 0 0 var(--radius) var(--radius); 
            padding: 24px 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.25); 
            transition: var(--transition); 
            position: relative;
            border: 1px solid var(--border);
            border-top: none;
            animation: ticketSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            transform-origin: top center;
        
            /* ⚡ 关键自适应属性：强制宽度充满网格列，并取消最小内容限制，实现 100% 同宽 */
            width: 100%;
            min-width: 0; 
        }
        @keyframes ticketSlideIn {
            from { opacity: 0; transform: translateY(-30px) scaleY(0.8); }
            to { opacity: 1; transform: translateY(0) scaleY(1); }
        }
        
        /* 顶部挂夹（工单夹） */
        .ticket-clip {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 14px;
            background: linear-gradient(180deg, #7a7e85 0%, #4a4d52 100%);
            border-radius: 4px;
            border: 1px solid #3a3c40;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 3;
        }
        .ticket-clip::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #111;
            border-radius: 50%;
        }
        
        /* 顶部锯齿裁切线 */
        .order-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(-45deg, var(--bg) 2px, transparent 0), linear-gradient(45deg, var(--bg) 2px, transparent 0);
            background-size: 4px 4px;
            background-repeat: repeat-x;
            z-index: 4;
        }
        
        /* 🎨 5分钟变红，变红后开始脉冲闪烁 */
        .order-card.warning { border-bottom: 5px solid var(--warning); }
        .order-card.danger { border-bottom: 5px solid var(--danger); animation: pulseDanger 2.5s infinite; }
        @keyframes pulseDanger {
            0% { box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
            50% { box-shadow: 0 0 20px rgba(255, 69, 58, 0.25); border-color: var(--danger); }
            100% { box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
        }
        
        /* --- 卡片头部 --- */
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 2px dashed var(--border); gap: 10px; }
        
        /* 🎨 桌号标签（微型化升级，绝不换行，绝不重叠） */
        .table-badge { 
            background: var(--text); 
            color: var(--bg); 
            padding: 4px 8px; /* ⚡ 缩窄，确保左侧有足够空间 */
            border-radius: 6px; 
            font-weight: 900; 
            font-size: 16px; /* ⚡ 物理缩小，防止撑破卡片 header */
            font-family: "Courier New", Courier, monospace; 
            letter-spacing: -0.5px; 
            white-space: nowrap !important; /* ⚡ 强阻换行 */
            flex-shrink: 0 !important;      /* ⚡ 强阻挤压 */
            display: inline-block !important;
        }
        
        /* 🎨 外带呼吸徽章（微型化升级，并加入 TAKEAWAY 字样） */
        .takeaway-badge {
            background: var(--accent);
            color: #000000;
            padding: 3px 6px; /* ⚡ 缩窄，留足空隙 */
            border-radius: 6px;
            font-size: 10px; /* ⚡ 物理缩小 */
            font-weight: 900;
            letter-spacing: 0.5px;
            animation: pulseTakeaway 1.5s infinite;
            white-space: nowrap !important; /* ⚡ 强阻换行与堆叠 */
            flex-shrink: 0 !important;      
            display: inline-block !important;
        }
        @keyframes pulseTakeaway {
            0% { box-shadow: 0 0 0 0 rgba(255, 149, 0, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(255, 149, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 149, 0, 0); }
        }
        
        .timer-info { text-align: right; margin-left: 10px; flex-shrink: 0; }
        .timer-text { font-size: 18px; font-weight: 900; color: var(--glowing-green); font-family: "SF Mono", Monaco, Consolas, monospace; letter-spacing: -0.5px; white-space: nowrap; }
        .time-stamp { font-size: 10px; opacity: 0.5; font-weight: 800; margin-top: 3px; letter-spacing: 0.5px; white-space: nowrap; }
        
        /* --- 卡片内容 (极简/高对比) --- */
        .card-content { flex-grow: 1; margin-bottom: 24px; }
        .drink-item { margin-bottom: 12px; display: flex; align-items: flex-start; gap: 10px; }
        .drink-qty { background: #ff453a; color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 900; flex-shrink: 0; margin-top: 2px; }
        .drink-qty.qty-one { background: var(--border); color: var(--text); opacity: 0.7; }
        .drink-detail { font-size: 16px; font-weight: 900; line-height: 1.35; color: var(--text); }
        .drink-mods { font-size: 13px; color: var(--warning); font-weight: 800; display: block; margin-top: 4px; background: rgba(255, 159, 10, 0.08); padding: 3px 8px; border-radius: 6px; border-left: 3px solid var(--warning); }
        
        /* --- 动作按钮 (触控优先) --- */
        .action-btn { 
            width: 100%; 
            height: 52px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.15s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            letter-spacing: 0.5px;
        }
        .action-btn:active { transform: scale(0.97); }
        .btn-ready { background: var(--text); color: var(--bg); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-recall { background: var(--card); color: var(--text); border: 2px solid var(--border); }
        
        /* --- 📱 手机端物理流式排版（保持同一行不折行） --- */
        @media (max-width: 650px) {
            .header {
                padding-bottom: 12px;
                margin-bottom: 15px;
            }
            .system-title {
                font-size: 17px; 
            }
            .live-clock-kds {
                font-size: 13px;
                margin-left: 8px;
                padding-left: 8px;
            }
            .status-indicator span {
                display: none; 
            }
            .status-indicator {
                padding: 6px;
                border-radius: 50%;
                width: 18px;
                height: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: none;
            }
            .header-controls {
                gap: 6px; 
            }
            .header-btn {
                width: 36px;
                height: 36px; 
            }
            .header-btn svg {
                width: 15px;
                height: 15px;
            }
            .settings-drawer {
                top: 55px; 
            }
        }
        
        /* --- 🎨 100% 还原员工端物理通知卡片栈 CSS --- */
        #toastContainer { position: fixed; top: 45px; left: 0; width: 100%; height: 60px; pointer-events: none; z-index: 100000; }
        .k-toast { 
            position: absolute; 
            top: 0;
            left: 50%; 
            /* 自适应宽度包裹，跟字数一样长，绝不占满屏幕 */
            width: max-content; 
            max-width: 90%; 
            background: rgba(255, 255, 255, 0.85); 
            color: #000000; 
            padding: 10px 18px; 
            border-radius: 14px; 
            font-size: 13px; 
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; 
            align-items: center; 
            justify-content: center; /* 图标与文字并排水平居中 */ 
            gap: 8px; 
            border: none !important;
            opacity: 0;
            /* 物理初始态：自顶部高空下滑入场 */
            transform: translate(-50%, -100px) scale(0.85);
            /* 配合极速高弹力物理曲线 */
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.22s, z-index 0.22s;
            pointer-events: auto;
            will-change: transform, opacity;
        }
        [data-theme="dark"] .k-toast { background: rgba(20, 20, 20, 0.75) !important; color: #ffffff !important; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        /* 高保真圆形勾形 SVG 矢量 */
        .toast-check-svg { width: 16px; height: 16px; stroke: var(--success); stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        
        /* 物理层叠权重 */
        .k-toast.stack-0 { opacity: 1; transform: translate(-50%, 0) scale(1); z-index: 100; }
        .k-toast.stack-1 { opacity: 0.7; transform: translate(-50%, -12px) scale(0.94); z-index: 90; }
        .k-toast.stack-2 { opacity: 0.35; transform: translate(-50%, -24px) scale(0.88); z-index: 80; }
        
        /* 出场动画：原路高速滑回顶部淡出 */
        .k-toast.exit-up { opacity: 0 !important; transform: translate(-50%, -100px) scale(0.82) !important; transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1); } 
    </style>
</head>

<body>

    <!-- 🎨 100% 引入员工端物理通知卡片栈容器 -->
    <div id="toastContainer"></div>

    <div class="app-container">

        <!-- 头部控制器 -->
        <div class="header">
            <div class="title-group">
                <div class="system-title">KITCHEN-SYSTEM</div>

                <!-- 实时系统物理时钟 -->
                <div class="live-clock-kds" id="liveClock">--:--</div>

                <!-- 云端连接状态灯 -->
                <div class="status-indicator" style="margin-left: 10px;">
                    <div class="status-dot" id="dbStatus"></div>
                    <span id="connLabel">CLOUD CONNECTED</span>
                </div>
            </div>

            <div class="header-controls">
                <!-- 🔊 音效设置按钮（弹窗卡片触发器） -->
                <button class="header-btn" id="soundBtn" onclick="toggleSettingsDrawer(event)" title="后厨设置">
                    <svg viewBox="0 0 24 24">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                </button>

                <!-- 🌓 主题模式循环切换按钮（亮色显示太阳，暗色显示月亮） -->
                <button class="header-btn" id="themeBtn" onclick="cycleTheme()" title="模式切换">
                    <!-- 由 JS 精确绑定渲染 -->
                </button>

                <!-- 🖥️ 全屏切换按钮 -->
                <button class="header-btn" id="fsBtn" onclick="toggleFullscreen()" title="全屏切换">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3" />
                    </svg>
                </button>

                <!-- 🎨 音效与物理缩放设置抽屉 (Dynamic Settings Drawer) -->
                <div class="settings-drawer" id="settingsDrawer">

                    <!-- 1. 音效类型手绘卡片 -->
                    <div class="drawer-section" style="text-align: left;">
                        <div class="drawer-header-row">
                            <svg viewBox="0 0 24 24" class="label-icon">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                            <span class="drawer-label">系统通知音效</span>
                        </div>
                        <div class="sound-card-grid">
                            <!-- 🎵 Chime -->
                            <div class="sound-option-card active" id="sc_chime" onclick="selectSoundCard('chime')">
                                <svg viewBox="0 0 24 24">
                                    <path d="M9 18V5l12-2v13"></path>
                                    <circle cx="6" cy="18" r="3"></circle>
                                    <circle cx="18" cy="16" r="3"></circle>
                                </svg>
                                <span>优雅和弦</span>
                            </div>
                            <!-- 📟 Beep-Beep -->
                            <div class="sound-option-card" id="sc_beep" onclick="selectSoundCard('beep')">
                                <svg viewBox="0 0 24 24">
                                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                                    <path d="M6 12h4m4 0h4M10 16h4"></path>
                                </svg>
                                <span>电子双嘀</span>
                            </div>
                            <!-- 🔔 Bell -->
                            <div class="sound-option-card" id="sc_bell" onclick="selectSoundCard('bell')">
                                <svg viewBox="0 0 24 24">
                                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                                </svg>
                                <span>复古机械</span>
                            </div>
                            <!-- 📡 Sonar -->
                            <div class="sound-option-card" id="sc_sonar" onclick="selectSoundCard('sonar')">
                                <svg viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="2"></circle>
                                    <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"></path>
                                </svg>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";  
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";  
        
        // 绑定与员工端一致的 Firebase 配置与服务
        const firebaseConfig = { apiKey: "AIzaSyBNk0S-ArNKrK_fmUZJb6K2U2252rT5FNU", projectId: "restaurant-app-bc3c1" };  
        const app = initializeApp(firebaseConfig);  
        const db = getFirestore(app);  
        
        let orders = [];
        let currentView = 'pending'; // 'pending' 或 'completed'
        let previousPendingIds = new Set();
        let isInitialLoad = true;
        
        // 初始化/加载声音设定
        let audioCtx = null;
        
        function getSoundConfig() {
            return {
                type: localStorage.getItem('kds_sound_type') || 'chime',
                volume: 0.5 
            };
        }
        
        // Web Audio API 音效引擎
        function playChime() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const config = getSoundConfig();
                const now = audioCtx.currentTime;
        
                // 创建主增益控制器 (Volume Node)
                const masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.35, now);
                masterGain.connect(audioCtx.destination);
        
                const soundType = config.type;
        
                if (soundType === 'chime') {
                    // 1. 和弦提示 (Chime)
                    const playTone = (freq, startOffset, duration) => {
                        const osc = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, now + startOffset);
                        
                        gainNode.gain.setValueAtTime(0.8, now + startOffset);
                        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + startOffset + duration);
                        
                        osc.connect(gainNode);
                        gainNode.connect(masterGain);
                        osc.start(now + startOffset);
                        osc.stop(now + startOffset + duration);
                    };
                    playTone(523.25, 0, 0.4);      // C5
                    playTone(659.25, 0.12, 0.5);   // E5
                    playTone(783.99, 0.24, 0.6);   // G5
        
                } else if (soundType === 'beep') {
                    // 2. 出单机电子双嘀 (Beep-Beep)
                    const playBeep = (startOffset) => {
                        const osc = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(2000, now + startOffset);
                        
                        gainNode.gain.setValueAtTime(1.0, now + startOffset);
                        gainNode.gain.setValueAtTime(1.0, now + startOffset + 0.08);
                        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + startOffset + 0.09);
                        
                        osc.connect(gainNode);
                        gainNode.connect(masterGain);
                        osc.start(now + startOffset);
                        osc.stop(now + startOffset + 0.1);
                    };
                    playBeep(0);
                    playBeep(0.12);
        
                } else if (soundType === 'bell') {
                    // 3. 复古机械铃 (Retro Bell)
                    const playMetalBell = (freq, startOffset) => {
                        const osc = audioCtx.createOscillator();
                        const oscMod = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + startOffset);
                        
                        // 调制器
                        oscMod.type = 'sawtooth';
                        oscMod.frequency.setValueAtTime(120, now + startOffset);
                        
                        const modGain = audioCtx.createGain();
                        modGain.gain.setValueAtTime(40, now + startOffset);
                        
                        oscMod.connect(modGain);
                        modGain.connect(osc.frequency);
                        
                        gainNode.gain.setValueAtTime(1.2, now + startOffset);
                        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + startOffset + 0.8);
                        
                        osc.connect(gainNode);
                        gainNode.connect(masterGain);
                        
                        oscMod.start(now + startOffset);
                        osc.start(now + startOffset);
                        oscMod.stop(now + startOffset + 0.8);
                        osc.stop(now + startOffset + 0.8);
                    };
                    playMetalBell(1500, 0);
        
                } else if (soundType === 'sonar') {
                    // 4. 科技声呐 (Sonar Radar)
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1400, now);
                    osc.frequency.exponentialRampToValueAtTime(900, now + 0.6);
                    
                    gainNode.gain.setValueAtTime(1.0, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
                    
                    osc.connect(gainNode);
                    gainNode.connect(masterGain);
                    osc.start(now);
                    osc.stop(now + 0.7);
                }
            } catch (e) {
                console.error("Audio Synthesis Error: ", e);
            }
        }
        
        window.testSelectedSound = () => {
            playChime();
        };
        
        // --- 🎨 100% 还原员工端层叠通知物理气泡 JS 算法 ---
        let activeToasts = [];
        window.showToast = (msg) => { 
            const container = document.getElementById('toastContainer');
            if(!container) return;
            
            const t = document.createElement('div');
            t.className = 'k-toast';
            
            t.innerHTML = `
                <svg class="toast-check-svg" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>${msg}</span>
            `;
            container.appendChild(t);
            
            activeToasts.unshift(t); // 最新产生的始终推到层级最前部
            
            // 物理降落激活
            setTimeout(() => {
                updateToastStack();
            }, 16);
            
            // 2.2秒后高速滑回顶部淡出销毁
            setTimeout(() => {
                t.classList.add('exit-up');
                setTimeout(() => {
                    t.remove();
                    activeToasts = activeToasts.filter(el => el !== t);
                    updateToastStack();
                }, 320);
            }, 2200);
        };
        
        function updateToastStack() {
            activeToasts.forEach((t, idx) => {
                t.classList.remove('stack-0', 'stack-1', 'stack-2');
                if (idx === 0) {
                    t.classList.add('stack-0'); 
                } else if (idx === 1) {
                    t.classList.add('stack-1'); 
                } else if (idx === 2) {
                    t.classList.add('stack-2'); 
                } else {
                    t.style.opacity = '0';
                    setTimeout(() => t.remove(), 300);
                }
            });
            activeToasts = activeToasts.filter(t => document.body.contains(t));
        }
        
        // --- 控制设置抽屉的展开/隐藏 ---
        window.toggleSettingsDrawer = (event) => {
            if(event) event.stopPropagation();
            const drawer = document.getElementById('settingsDrawer');
            
            if (!drawer.classList.contains('show')) {
                const config = getSoundConfig();
                document.querySelectorAll('.sound-option-card').forEach(el => el.classList.remove('active'));
                const activeCard = document.getElementById(`sc_${config.type}`);
                if (activeCard) activeCard.classList.add('active');
            }
        
            drawer.classList.toggle('show');
        };
        
        // 点击音效手绘卡片
        window.selectSoundCard = (type) => {
            localStorage.setItem('kds_sound_type', type);
            document.querySelectorAll('.sound-option-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`sc_${type}`).classList.add('active');
            playChime(); 
        };
        
        // 🎨 物理滑动/滚动页面、或点击空白处时，自适应卡片自动收起关闭
        const closeDrawer = () => {
            const drawer = document.getElementById('settingsDrawer');
            if (drawer && drawer.classList.contains('show')) {
                drawer.classList.remove('show');
            }
        };
        
        window.addEventListener('scroll', closeDrawer, { passive: true });
        window.addEventListener('touchmove', closeDrawer, { passive: true });
        
        document.addEventListener('click', (e) => {
            const drawer = document.getElementById('settingsDrawer');
            const soundBtn = document.getElementById('soundBtn');
            if (drawer && drawer.classList.contains('show')) {
                if (!drawer.contains(e.target) && e.target !== soundBtn && !soundBtn.contains(e.target)) {
                    drawer.classList.remove('show');
                }
            }
        });
        
        // 全屏切换处理器
        window.toggleFullscreen = () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) {
                    docEl.requestFullscreen();
                } else if (docEl.webkitRequestFullscreen) {
                    docEl.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        };
        
        function updateFullscreenUI() {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement;
            const btn = document.getElementById('fsBtn');
            if (!btn) return;
            if (isFS) {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;">
                        <path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/>
                    </svg>
                `;
            } else {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
                    </svg>
                `;
            }
        }
        document.addEventListener('fullscreenchange', updateFullscreenUI);
        document.addEventListener('webkitfullscreenchange', updateFullscreenUI);
        
        // --- 循环切换系统主题模式 (Auto -> Light -> Dark) ---
        window.cycleTheme = () => {
            const list = ['auto', 'light', 'dark'];
            const cur = localStorage.getItem('kds_theme_mode') || 'auto';
            let nextIdx = (list.indexOf(cur) + 1) % list.length;
            setThemeMode(list[nextIdx], nextIdx);
        };
        
        // 🌗 图标绑定：亮色显示太阳，暗色显示月亮 🌗
        window.setThemeMode = (m, idx) => {
            localStorage.setItem('kds_theme_mode', m);
            setOptUI(document.getElementById('themeSwitch'), idx);
            
            let actualMode = m;
            if (m === 'auto') {
                actualMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.body.setAttribute('data-theme', actualMode);
            
            const themeBtn = document.getElementById('themeBtn');
            if (actualMode === 'light') {
                themeBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                `;
            } else {
                themeBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                `;
            }
        };
        
        // 🕐 12H 与 24H 动态转换逻辑（公用方法）
        function formatTimeValue(date) {
            if (!date) return "--:--";
            let h = date.getHours();
            const m = date.getMinutes().toString().padStart(2, '0');
            const format = localStorage.getItem('kds_time_format') || '12h';
            
            if (format === '24h') {
                return `${h.toString().padStart(2, '0')}:${m}`;
            } else {
                const sfx = h >= 12 ? " PM" : " AM";
                h = h % 12 || 12;
                return `${h.toString().padStart(2, '0')}:${m}${sfx}`;
            }
        }
        
        // 全局控制 12/24 时间格式状态
        window.setTimeFormat = (f, idx) => {
            localStorage.setItem('kds_time_format', f);
            localStorage.setItem('kds_time_format_idx', idx);
            setOptUI(document.getElementById('timeSwitch'), idx);
            updateLiveClock(); // 立刻刷新系统时钟
            renderOrders();    // 立刻让屏幕内所有卡片时间应用新格式
        };
        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            const cur = localStorage.getItem('kds_theme_mode') || 'auto';
            if (cur === 'auto') {
                setThemeMode('auto', 0);
            }
        });
        
        // 定制面板滑块切换控制
        function setOptUI(parent, idx) {
            const slider = parent.querySelector('.sw-slider');
            const buttons = parent.querySelectorAll('.sw-btn');
            const count = buttons.length;
            slider.style.width = `calc(${100 / count}% - 8px)`;
            slider.style.left = `calc(${(idx * 100) / count}% + 4px)`;
            buttons.forEach((b, i) => b.classList.toggle('active', i === idx));
        }
        
        // 视图类别选择
        window.switchView = (view) => {
            currentView = view;
            document.getElementById('tabPending').classList.toggle('active', view === 'pending');
            document.getElementById('tabCompleted').classList.toggle('active', view === 'completed');
            renderOrders();
        };
        
        // 🎨 顶栏实时物理时钟刷新函数
        function updateLiveClock() {
            const now = new Date();
            const clockEl = document.getElementById('liveClock');
            if (clockEl) {
                clockEl.innerText = formatTimeValue(now);
            }
        }
        setInterval(updateLiveClock, 1000);
        
        // KDS 核心初始化：拉取云端订单
        function initKDS() {
            // 实时时钟初始化
            updateLiveClock();
        
            // 自动主题/连接模式初始化
            const savedThemeMode = localStorage.getItem('kds_theme_mode') || 'auto';
            const savedThemeIdx = savedThemeMode === 'auto' ? 0 : (savedThemeMode === 'light' ? 1 : 2);
            window.setThemeMode(savedThemeMode, savedThemeIdx);
        
            // 12/24小时格式偏好初始化
            const savedTimeFormat = localStorage.getItem('kds_time_format') || '12h';
            const savedTimeIdx = savedTimeFormat === '12h' ? 0 : 1;
            window.setTimeFormat(savedTimeFormat, savedTimeIdx);
        
            // 监听 orders 数据库，按创建时间从旧到新排序（先进先出模型 FIFO）
            const ordersQuery = query(collection(db, "orders"), orderBy("createdAt", "asc"));
            
            onSnapshot(ordersQuery, (snapshot) => {
                orders = [];
                let newPendingDetected = false;
                const currentPendingIds = new Set();
        
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const orderItem = { id: doc.id, ...data };
                    orders.push(orderItem);
        
                    if (orderItem.status === 'pending') {
                        currentPendingIds.add(orderItem.id);
                        if (!isInitialLoad && !previousPendingIds.has(orderItem.id)) {
                            newPendingDetected = true;
                        }
                    }
                });
        
                if (newPendingDetected) {
                    playChime();
                }
        
                previousPendingIds = currentPendingIds;
                isInitialLoad = false;
                
                document.getElementById('dbStatus').className = "status-dot";
                document.getElementById('connLabel').innerText = "CLOUD CONNECTED";
                
                updateBadges();
                renderOrders();
            }, (error) => {
                console.error("Firestore Error: ", error);
                document.getElementById('dbStatus').className = "status-dot offline";
                document.getElementById('connLabel').innerText = "CONNECTION LOST";
            });
        
            // 启动全局生命周期高精计时刷新器
            setInterval(updateTimers, 1000);
        }
        
        // 解析合并的单据串为更清晰直观的后厨列表结构
        function parseDisplayStr(str) {
            if (!str) return [];
            return str.split(',').map(item => {
                const cleanItem = item.trim();
                const qtyMatch = cleanItem.match(/x(\d+)/);
                const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
                
                let namePart = cleanItem.replace(/x\d+/, '').trim();
                
                const bracketMatch = namePart.match(/\(([^)]+)\)/);
                const mods = bracketMatch ? bracketMatch[1] : '';
                namePart = namePart.replace(/\([^)]+\)/, '').trim();
        
                return { name: namePart, mods: mods, qty: qty };
            }).filter(d => d.name !== '');
        }
        
        // 订单角标计数更新
        function updateBadges() {
            const pendingCount = orders.filter(o => o.status === 'pending').length;
            const completedCount = orders.filter(o => o.status === 'completed').length;
            document.getElementById('pendingCount').innerText = pendingCount;
            document.getElementById('completedCount').innerText = completedCount;
        }
        
        // 高精时间差计算
        function getElapsedTime(createdAt) {
            if (!createdAt) return { text: '--:--', minutes: 0 };
            const createdTime = createdAt.seconds ? new Date(createdAt.seconds * 1000) : new Date(createdAt);
            const diffMs = new Date() - createdTime;
            const diffMins = Math.floor(diffMs / 60000);
            const diffSecs = Math.floor((diffMs % 60000) / 1000);
            
            // 🎨 两段/三段智能时间格式：小于10分钟显示分秒，10分钟以上显示整分钟，达到/超过60分钟自动转换为“X小时”
            let timeText = "";
            if (diffMins >= 60) {
                const hours = Math.floor(diffMins / 60);
                timeText = `${hours}小时`;
            } else if (diffMins >= 10) {
                timeText = `${diffMins}分钟`;
            } else {
                timeText = `${diffMins}:${diffSecs.toString().padStart(2, '0')}`;
            }
            
            return {
                text: timeText,
                minutes: diffMins
            };
        }
        
        // 每秒实时重新核对订单的耗时情况
        function updateTimers() {
            const cards = document.querySelectorAll('.order-card[data-id]');
            cards.forEach(card => {
                const id = card.getAttribute('data-id');
                const order = orders.find(o => o.id === id);
                if (!order || order.status !== 'pending') return;
        
                const elapsed = getElapsedTime(order.createdAt);
                const timerEl = card.querySelector('.timer-text');
                if (timerEl) timerEl.innerText = elapsed.text;
        
                // 🎨 5分钟红牌严重警报 (3分钟黄牌警告)
                card.classList.remove('warning', 'danger');
                if (elapsed.minutes >= 5) {
                    card.classList.add('danger');
                } else if (elapsed.minutes >= 3) {
                    card.classList.add('warning');
                }
            });
        }
        
        // 🎨 核心优化：直接双击（Double Click）触发完结修改，不进行二次磨砂提问
        window.toggleOrderStatus = async (id, currentStatus) => {
            const nextStatus = currentStatus === 'pending' ? 'completed' : 'pending';
            
            // 🎨 精准同步员工端 100% 相同的高清层叠物理气泡通知（Toast）而非中间大弹窗
            const successMsg = nextStatus === 'completed' ? '出餐成功！' : '订单已撤回重做！';
            
            try {
                await updateDoc(doc(db, "orders", id), { status: nextStatus });
                // 一键直接触发员工端同款物理卡片气泡降落
                window.showToast(successMsg);
            } catch (e) {
                console.error("Failed to update status: ", e);
            }
        };
        
        // 渲染订单看板
        function renderOrders() {
            const grid = document.getElementById('orderGrid');
            grid.innerHTML = '';
        
            const filteredOrders = orders.filter(o => o.status === currentView);
        
            if (filteredOrders.length === 0) {
                const emptyMsg = currentView === 'pending' 
                    ? '暂无未处理的后厨订单' 
                    : '还没有已完成的订单记录';
                grid.innerHTML = `<div class="no-orders-msg">${emptyMsg}</div>`;
                return;
            }
        
            filteredOrders.forEach((o) => {
                const elapsed = getElapsedTime(o.createdAt);
                const card = document.createElement('div');
                card.className = 'order-card';
                card.setAttribute('data-id', o.id);
        
                if (o.status === 'pending') {
                    if (elapsed.minutes >= 5) card.classList.add('danger');
                    else if (elapsed.minutes >= 3) card.classList.add('warning');
                }
        
                const dateObj = o.createdAt?.seconds ? new Date(o.createdAt.seconds * 1000) : new Date(o.createdAt);
                
                // 🕐 动态转换并应用偏好配置的时间格式
                const localTimeString = formatTimeValue(dateObj);
        
                const itemsListHTML = parseDisplayStr(o.displayStr).map(item => `
                    <div class="drink-item">
                        <span class="drink-qty ${item.qty === 1 ? 'qty-one' : ''}">x${item.qty}</span>
                        <div class="drink-detail">
                            ${item.name}
                            ${item.mods ? `<span class="drink-mods">${item.mods}</span>` : ''}
                        </div>
                    </div>
                `).join('');
        
                // 🎨 双击动作事件绑定（由 onclick 全面升级为 ondblclick）
                const actionButtonHTML = o.status === 'pending'
                    ? `<button class="action-btn btn-ready" ondblclick="toggleOrderStatus('${o.id}', 'pending')">
                        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        <b>双击出餐 DOUBLE CLICK</b>
                       </button>`
                    : `<button class="action-btn btn-recall" ondblclick="toggleOrderStatus('${o.id}', 'completed')">
                        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                        <b>双击重做 RECALL</b>
                       </button>`;
        
                // 判定是否包含外带属性
                const isTakeaway = o.displayStr.toLowerCase().includes('外带') || o.displayStr.toLowerCase().includes('takeaway');
        
                card.innerHTML = `
                    <div class="ticket-clip"></div>
                    <div>
                        <div class="card-header">
                            <!-- 🎨 强阻折行与溢出的极简排列容器 -->
                            <div style="display:flex; align-items:center; gap:6px; flex-wrap: nowrap; min-width: 0;">
                                <div class="table-badge">T-${o.table.toString().padStart(2, '0')}</div>
                                ${isTakeaway ? `<div class="takeaway-badge">外带 TAKEAWAY</div>` : ''}
                            </div>
                            <div class="timer-info">
                                <div class="timer-text">${o.status === 'pending' ? elapsed.text : 'DONE'}</div>
                                <div class="time-stamp">点餐：${localTimeString}</div>
                            </div>
                        </div>
                        <div class="card-content">
                            ${itemsListHTML}
                        </div>
                    </div>
                    <div>
                        ${actionButtonHTML}
                    </div>
                `;
        
                grid.appendChild(card);
            });
        }
        
        // 绑定页面全局点击解锁 Web Audio
        document.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });
        
        initKDS();
    </script>
</body>

</html>
